spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/catalog_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate # O Flyway cuida da estrutura, o Hibernate só valida
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
